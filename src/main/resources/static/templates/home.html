<div class="filter-box">
    <div class="filter-header">
        <i class="fas fa-sliders-h"></i>
        <h3>Filters</h3>
    </div>

    <div class="filter-section">
        <label class="filter-section-label">
            <i class="fas fa-tag"></i> Category
        </label>
        <select id="category-select" class="form-select" onchange="setCategory(this)">
            <option value="0">All Categories</option>
        </select>
    </div>

    <div class="filter-section">
        <label class="filter-section-label">
            <i class="fas fa-dollar-sign"></i> Price Range
        </label>
        <div class="price-display">
            <span class="price-badge">$<span id="min-price-display">0</span></span>
            <span class="price-separator">—</span>
            <span class="price-badge">$<span id="max-price-display">1500</span></span>
        </div>
        <input type="range" class="form-range" id="min-price" min="0" max="1500" value="0" onchange="setMinPrice(this)">
        <input type="range" class="form-range" id="max-price" min="0" max="1500" value="1500" onchange="setMaxPrice(this)">
    </div>

    <div class="filter-section">
        <label class="filter-section-label">
            <i class="fas fa-palette"></i> Color
        </label>
        <select id="subcategory-select" class="form-select" onchange="setSubcategory(this)">
            <option value="">All Colors</option>
            <option>Black</option>
            <option>White</option>
            <option>Gray</option>
            <option>Blue</option>
            <option>Red</option>
            <option>Brown</option>
            <option>Silver</option>
            <option>Charcoal</option>
            <option>Navy</option>
            <option>Green</option>
            <option>Orange</option>
            <option>Yellow</option>
            <option>Pink</option>
            <option>Clear</option>
            <option>Tan</option>
            <option>Burgundy</option>
            <option>Maroon</option>
            <option>Mint</option>
            <option>Lavender</option>
            <option>Teal</option>
            <option>Olive</option>
            <option>Khaki</option>
            <option>Turquoise</option>
        </select>
    </div>

    <div class="filter-divider"></div>

    <div class="filter-section">
        <label class="filter-section-label">
            <i class="fas fa-bolt"></i> Quick Price
        </label>
        <div class="quick-filter-chips">
            <button class="chip" onclick="applyPricePreset(0,50)">Under $50</button>
            <button class="chip" onclick="applyPricePreset(50,100)">$50–$100</button>
            <button class="chip" onclick="applyPricePreset(100,250)">$100–$250</button>
            <button class="chip" onclick="applyPricePreset(250,1500)">$250+</button>
        </div>
    </div>

    <div class="filter-section">
        <label class="filter-section-label">Popular Colors</label>
        <div class="color-swatches">
            <button class="color-swatch" style="background:#111111" onclick="quickColor('Black')" title="Black"></button>
            <button class="color-swatch" style="background:#2563eb" onclick="quickColor('Blue')" title="Blue"></button>
            <button class="color-swatch" style="background:#9ca3af" onclick="quickColor('Gray')" title="Gray"></button>
            <button class="color-swatch" style="background:#ef4444" onclick="quickColor('Red')" title="Red"></button>
            <button class="color-swatch" style="background:#10b981" onclick="quickColor('Green')" title="Green"></button>
            <button class="color-swatch" style="background:#f59e0b" onclick="quickColor('Brown')" title="Brown"></button>
            <button class="color-swatch" style="background:#8b5cf6" onclick="quickColor('Lavender')" title="Lavender"></button>
            <button class="color-swatch" style="background:#0d9488" onclick="quickColor('Teal')" title="Teal"></button>
        </div>
    </div>

    <button class="btn-reset-filters" onclick="resetAllFilters()">
        <i class="fas fa-undo"></i> Reset All Filters
    </button>
</div>
<div id="content" class="content"></div>
