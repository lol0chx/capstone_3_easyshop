
<div class="filter-box"></div>
<div id="content" class="profile-page">

  <!-- Profile Header -->
  <div class="profile-header">
    <div class="profile-avatar-section">
      <div class="profile-avatar">
        <img id="avatarPreview" src="" alt="Avatar" style="display:none;" />
        <span id="avatarInitials">U</span>
      </div>
      <div class="profile-user-info">
        <h1>{{firstName}} {{lastName}}</h1>
        <p class="profile-email">{{email}}</p>
        <span class="profile-badge"><i class="fas fa-check-circle"></i> Verified Account</span>
      </div>
    </div>
    <div class="profile-header-actions">
      <button class="btn btn-primary" onclick="saveProfile()">
        <i class="fas fa-save"></i> Save Changes
      </button>
      <button class="btn btn-outline-secondary" onclick="loadHome()">
        <i class="fas fa-arrow-left"></i> Back to Store
      </button>
    </div>
  </div>

  <!-- Profile Completion Bar -->
  <div class="profile-completion">
    <div class="profile-completion-header">
      <span>Profile Completion</span>
      <span id="profileProgressText" class="profile-completion-pct"></span>
    </div>
    <div class="profile-progress-track">
      <div id="profileProgress" class="profile-progress-fill"></div>
    </div>
  </div>

  <!-- Two-column layout for cards -->
  <div class="profile-grid">

    <!-- Personal Information Card -->
    <div class="profile-card">
      <div class="profile-card-header">
        <i class="fas fa-user"></i>
        <h2>Personal Information</h2>
      </div>
      <div class="profile-card-body">
        <div class="profile-field">
          <label for="username">Username</label>
          <input type="text" class="form-control" id="username" value='{{username}}' disabled>
        </div>
        <div class="profile-field-row">
          <div class="profile-field">
            <label for="firstName">First Name <span class="required">*</span></label>
            <input type="text" class="form-control" id="firstName" value='{{firstName}}' placeholder="Enter first name">
          </div>
          <div class="profile-field">
            <label for="lastName">Last Name <span class="required">*</span></label>
            <input type="text" class="form-control" id="lastName" value='{{lastName}}' placeholder="Enter last name">
          </div>
        </div>
      </div>
    </div>

    <!-- Contact Information Card -->
    <div class="profile-card">
      <div class="profile-card-header">
        <i class="fas fa-address-book"></i>
        <h2>Contact Information</h2>
      </div>
      <div class="profile-card-body">
        <div class="profile-field">
          <label for="email">Email Address <span class="required">*</span></label>
          <input type="email" class="form-control" id="email" value='{{email}}' placeholder="Enter email address">
        </div>
        <div class="profile-field">
          <label for="phone">Phone Number</label>
          <input type="tel" class="form-control" id="phone" value='{{phone}}' placeholder="Enter phone number">
        </div>
      </div>
    </div>

    <!-- Shipping Address Card (full width) -->
    <div class="profile-card profile-card-full">
      <div class="profile-card-header">
        <i class="fas fa-map-marker-alt"></i>
        <h2>Shipping Address</h2>
      </div>
      <div class="profile-card-body">
        <div class="profile-field">
          <label for="address">Street Address</label>
          <input type="text" class="form-control" id="address" value='{{address}}' placeholder="Enter street address">
        </div>
        <div class="profile-field-row profile-field-row-3">
          <div class="profile-field">
            <label for="city">City</label>
            <input type="text" class="form-control" id="city" value='{{city}}' placeholder="Enter city">
          </div>
          <div class="profile-field">
            <label for="state">State</label>
            <input type="text" class="form-control" id="state" value='{{state}}' placeholder="Enter state">
          </div>
          <div class="profile-field">
            <label for="zip">ZIP Code</label>
            <input type="text" class="form-control" id="zip" value='{{zip}}' placeholder="Enter ZIP code">
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Bottom Save -->
  <div class="profile-bottom-actions">
    <button class="btn btn-primary" onclick="saveProfile()">
      <i class="fas fa-save"></i> Save Changes
    </button>
    <button class="btn btn-outline-secondary" onclick="loadHome()">
      <i class="fas fa-arrow-left"></i> Back to Store
    </button>
  </div>

</div>
